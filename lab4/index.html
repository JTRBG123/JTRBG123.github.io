<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sign Up</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main class="container py-5">
		<div class="row justify-content-center">
			<div class="col-12 col-md-10 col-lg-8">
				<div class="card shadow-sm signup-card">
					<div class="card-body p-4 p-md-5">
						<h1 class="h3 mb-4 text-center">Sign Up Form</h1>

						<form id="signupForm" novalidate>
							<div class="row g-3">
								<div class="col-md-6">
									<label for="firstName" class="form-label">First Name</label>
									<input id="firstName" type="text" class="form-control">
								</div>
								<div class="col-md-6">
									<label for="lastName" class="form-label">Last Name</label>
									<input id="lastName" type="text" class="form-control">
								</div>

								<div class="col-md-6">
									<label for="email" class="form-label">Email</label>
									<input id="email" type="email" class="form-control">
								</div>
								<div class="col-md-6">
									<label for="phone" class="form-label">Phone Number</label>
									<input id="phone" type="text" class="form-control">
								</div>

								<div class="col-md-6">
									<label for="zipCodeInput" class="form-label">Zip Code</label>
									<div class="zip-row">
										<input id="zipCodeInput" type="text" class="form-control" maxlength="5" inputmode="numeric">
										<span id="zipMessage" class="message inline-message"></span>
									</div>
								</div>
								<div class="col-md-6">
									<label class="form-label">City</label>
									<div id="cityDisplay" class="info-value">—</div>
								</div>

								<div class="col-md-6">
									<label class="form-label">Latitude</label>
									<div id="latitudeDisplay" class="info-value">—</div>
								</div>
								<div class="col-md-6">
									<label class="form-label">Longitude</label>
									<div id="longitudeDisplay" class="info-value">—</div>
								</div>

								<div class="col-md-6">
									<label for="stateSelect" class="form-label">State</label>
									<select id="stateSelect" class="form-select">
										<option value="">Select a State</option>
									</select>
								</div>
								<div class="col-md-6">
									<label for="countySelect" class="form-label">Select a County</label>
									<select id="countySelect" class="form-select" disabled>
										<option value="">Select a County</option>
									</select>
								</div>

								<div class="col-12">
									<label for="usernameInput" class="form-label">Desired Username</label>
									<input id="usernameInput" type="text" class="form-control">
									<div id="usernameMessage" class="form-text message"></div>
								</div>

								<div class="col-md-6">
									<label for="passwordInput" class="form-label">Password</label>
									<input id="passwordInput" type="password" class="form-control">
									<div id="passwordSuggestion" class="form-text message"></div>
								</div>
								<div class="col-md-6">
									<label for="retypePasswordInput" class="form-label">Type Password Again</label>
									<input id="retypePasswordInput" type="password" class="form-control">
								</div>

								<div class="col-12">
									<div id="submitMessage" class="message fw-semibold"></div>
								</div>

								<div class="col-12">
									<button type="submit" class="btn btn-primary w-100">Submit</button>
								</div>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</main>

	<script src="js/script.js"></script>
</body>
</html>
